<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星河占卜，塔罗启示</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zhi+Mang+Xing&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative&display=swap" rel="stylesheet">
    <style>
        .intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0933, #0d0126 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 2000;
            animation: fadeOut 2s ease forwards;
            animation-delay: 3s;
        }

        .intro-title {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 3.5em;
            color: #ffda6b;
            text-shadow: 0 0 20px rgba(255, 218, 107, 0.9), 0 0 8px rgba(255, 218, 107, 0.6);
            opacity: 0;
            animation: fadeInUp 2s ease forwards;
        }

        .intro-subtitle {
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.6em;
            margin-top: 20px;
            color: #ffda6b;
            text-shadow: 0 0 12px rgba(230, 207, 255, 0.6);
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
            animation-delay: 1.5s;
            text-align: center;
            position: absolute;
            bottom: 30%; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 90%;
        }

        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        body {
            font-family: 'Noto Serif SC', serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            background-color: #0d0126;
            color: #f0e0ff;
            overflow-x: hidden;
            line-height: 1.7;
            position: relative;
            padding-bottom: 50px;
        }

        .background-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(135deg, transparent 50%, rgba(20, 100, 150, 0.4) 80%),
                linear-gradient(25deg, transparent 50%, rgba(125, 38, 172, 0.4) 80%),
                linear-gradient(105deg, transparent 50%, rgba(90, 20, 138, 0.4) 80%),
                linear-gradient(195deg, transparent 50%, rgba(58, 15, 90, 0.4) 80%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 218, 107, 0.2), transparent 60%);
            background-size: 100% 200%, 100% 200%, 100% 200%, 100% 200%, 100% 100%;
            background-repeat: repeat-y, repeat-y, repeat-y, repeat-y, no-repeat;
            animation: auroraFlow 10s linear infinite;
            opacity: 0.9;
            z-index: -2;
        }

        @keyframes auroraFlow {
            0% { background-position: 0% 0%, 0% 0%, 0% 0%, 0% 0%, 80% 80%; }
            100% { background-position: 0% 100%, 0% 100%, 0% 100%, 0% 100%, 80% 80%; }
        }

        .star-field {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 1.5s infinite ease-in-out;
            transform: scale(0);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 0.8; transform: scale(1); }
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 1px;
            background: linear-gradient(to right, #ffffff, rgba(255, 255, 255, 0));
            border-radius: 50%;
            transform: rotate(45deg);
            animation: meteor-fall 5s linear forwards;
            pointer-events: none;
            z-index: 0;
        }

        .meteor::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            width: 150px;
            height: 2px;
            background: linear-gradient(to right, rgba(255, 255, 255, 0), #ffffff);
            transform: rotate(0deg);
        }

        @keyframes meteor-fall {
            0% {
                transform: translateX(0px) translateY(-50px) rotate(45deg);
                opacity: 0.8;
            }
            100% {
                transform: translateX(400px) translateY(400px) rotate(45deg);
                opacity: 0;
            }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px 20px;
            max-width: 800px;
            width: 90%;
            margin: 50px auto;
        }

        .title {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 4em;
            margin-bottom: 15px;
            color: #ffda6b;
            text-shadow: 0 0 20px rgba(255, 218, 107, 0.8), 0 0 8px rgba(255, 218, 107, 0.6);
            letter-spacing: 3px;
            line-height: 1.2;
        }

        .subtitle {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.4em;
            margin-bottom: 50px;
            color: #e6cfff;
            text-shadow: 0 0 5px rgba(230, 207, 255, 0.3);
        }

        .form-card, .result-card {
            background-color: rgba(30, 15, 50, 0.6);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px;
            border: 2px solid rgba(255, 218, 107, 0.4);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 218, 107, 0.15);
            transition: transform 0.5s ease-in-out, box-shadow 0.5s ease-in-out;
        }

        .form-card:hover {
            transform: translateY(-10px) scale(1.01);
            box-shadow: 0 15px 60px rgba(0, 0, 0, 0.7), inset 0 0 25px rgba(255, 218, 107, 0.25);
        }

        .result-hidden {
            display: none;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 15px;
            font-size: 1.3em;
            color: #f0e0ff;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(240, 224, 255, 0.3);
        }

        input[type="text"] {
            width: 100%;
            padding: 18px;
            border: 1px solid rgba(255, 218, 107, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 12px;
            font-size: 1.15em;
            box-sizing: border-box;
            transition: background-color 0.4s, border-color 0.4s, box-shadow 0.4s;
        }

        input[type="text"]::placeholder {
            color: #c4b8e0;
            opacity: 0.8;
        }

        input[type="text"]:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: #ffda6b;
            box-shadow: 0 0 15px rgba(255, 218, 107, 0.6);
        }

        .date-selects {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .date-selects select {
            flex: 1;
            padding: 18px 15px;
            border: 1px solid rgba(255, 218, 107, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: #f0e0ff;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffda6b%22%20d%3D%22M287%20114.2L146.2%20255.7%205.4%20114.2h281.6z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 12px;
            padding-right: 40px;
        }

        .date-selects select option,
        #spread-select option {
            background-color: #0d0126;
            color: #f0e0ff;
        }

        #spread-select {
            width: 100%;
            padding: 18px 15px;
            border: 1px solid rgba(255, 218, 107, 0.3);
            background: rgba(255, 255, 255, 0.08);
            color: #f0e0ff;
            border-radius: 12px;
            font-size: 1.1em;
            cursor: pointer;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23ffda6b%22%20d%3D%22M287%20114.2L146.2%20255.7%205.4%20114.2h281.6z%22%2F%3E%3C%2Fsvg%3E');
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 12px;
            padding-right: 40px;
        }

        .glow-on-hover {
            padding: 18px;
            background-color: #ffda6b;
            color: #1a0a2f;
            border: none;
            border-radius: 12px;
            font-size: 1.6em;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background-color 0.4s, transform 0.3s, box-shadow 0.4s;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .glow-on-hover:hover {
            background-color: #e0c25e;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 12px 30px rgba(255, 218, 107, 0.6);
        }

        .spread-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            min-height: auto;
        }

        .tarot-card {
            width: 100%;
            height: auto;
            display: block;
            position: relative;
        }

        .tarot-card img {
            max-width: 100%;
            height: auto;
            border: 3px solid rgba(255, 218, 107, 0.7);
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease-in-out;
        }

        .tarot-card.reversed img {
            transform: rotate(180deg);
        }

        .tarot-card:hover img {
            transform: translateY(-5px) scale(1.05);
        }

        .tarot-card.reversed:hover img {
            transform: translateY(-5px) scale(1.05) rotate(180deg);
        }

        .card-position-name {
            font-size: 1.2em;
            color: #ffda6b;
            margin-bottom: 10px;
            display: block;
            text-shadow: 0 0 5px rgba(255, 218, 107, 0.4);
        }

        .tarot-card-name-visible {
            font-family: 'Zhi Mang Xing', cursive;
            font-size: 1.6em;
            margin: 5px 0 0;
            color: #ffda6b;
            text-shadow: 0 0 5px rgba(255, 218, 107, 0.4);
        }

        .card-hover-info {
            position: absolute;
            top: 0%;
            left: 0%;
            transform: translateY(-50%, -50%);
            background-color: rgba(30, 15, 50, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 218, 107, 0.6);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.6);
            width: 250px;
            max-height: 400px;
            overflow-y: auto;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease-in-out, visibility 0.5s ease-in-out;
            z-index: 20;
            text-align: left;
            white-space: normal;
            pointer-events: none;
        }

        .tarot-card:hover .card-hover-info,
        .tarot-card.active .card-hover-info {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        .card-hover-info h3,
        .card-hover-info h4,
        .card-hover-info p {
            font-family: 'Noto Serif SC', serif;
            line-height: 1.6;
            color: #c9b1d3;
            margin: 5px 0;
        }

        .card-hover-info h4 {
            font-size: 1.2em;
            color: #f0e0ff;
            margin-top: 15px;
            border-bottom: 1px solid rgba(255, 218, 107, 0.3);
            padding-bottom: 5px;
        }

        .card-hover-info p {
            font-size: 1em;
            margin-top: 10px;
        }

        .card-hover-info .keywords,
        .card-hover-info .suggestion {
            font-style: italic;
            color: #ffda6b;
            font-size: 0.9em;
            margin-top: 15px;
        }

        three-card-spread {
            grid-template-columns: 1fr;
            grid-template-rows: repeat(3, auto);
            gap: 30px;
        }

        .three-card-spread .tarot-card {
            width: 160px;
            justify-self: center;
        }

        .five-card-spread {
            display: grid;
            grid-template-areas:
                ". top ."
                "left center right"
                ". bottom .";
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            min-height: auto;
        }

        .five-card-spread .top { grid-area: top; }
        .five-card-spread .left { grid-area: left; }
        .five-card-spread .center { grid-area: center; }
        .five-card-spread .right { grid-area: right; }
        .five-card-spread .bottom { grid-area: bottom; }

        .five-card-spread .tarot-card {
            width: 150px;
            align-self: center;
            justify-self: center;
        }

        @media (max-width: 768px) {
            .five-card-spread {
                grid-template-areas:
                    "top"
                    "left"
                    "center"
                    "right"
                    "bottom";
                grid-template-columns: 1fr;
                grid-template-rows: repeat(5, auto);
                gap: 30px;
            }
            .tarot-card {
                width: 160px;
            }
            input[type="text"],
            .date-selects select,
            #spread-select {
                padding: 15px;
            }
        }

        .message-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(30, 15, 50, 0.9);
            border-radius: 20px;
            padding: 30px 40px;
            border: 2px solid #ffda6b;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 0 10px rgba(255, 218, 107, 0.4);
            text-align: center;
            max-width: 350px;
            width: 80%;
            color: #f0e0ff;
            animation: fadeIn 0.3s ease-in-out;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .message-box p {
            margin: 0;
            font-size: 1.2em;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(255, 218, 107, 0.4);
        }

        .message-box button {
            padding: 12px 25px;
            background-color: #ffda6b;
            color: #1a0a2f;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s, box-shadow 0.3s;
        }

        .message-box button:hover {
            background-color: #e0c25e;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 218, 107, 0.6);
        }

    </style>
</head>
<body>
    <div class="intro-screen">
        <div class="intro-title">星河占卜</div>
        <div class="intro-subtitle">塔罗启示，指引命运之路</div>
    </div>
    <div class="background-gradient"></div>

    <div class="star-field"></div>

    <div class="container">
        <h1 class="title">星河占卜，塔罗启示</h1>
        <p class="subtitle">选择一种牌阵后，集中精神默念需要指引的问题...</p>

        <div id="form-card" class="form-card">
            <div class="input-group">
                <label for="name">你的称谓</label>
                <input type="text" id="name" placeholder="请输入你的名字或昵称">
            </div>

            <div class="input-group">
                <label for="phone">手机号码</label>
                <input type="text" id="phone" placeholder="请输入您的手机号" maxlength="11">
            </div>

            <div class="input-group">
                <label>出生年 / 月 / 日</label>
                <div class="date-selects">
                    <select id="year-select"></select>
                    <select id="month-select"></select>
                    <select id="day-select"></select>
                </div>
            </div>

            <div class="input-group">
                <label for="spread-select">选择想占卜的牌阵</label>
                <select id="spread-select">
                    <option value="three-card">三牌阵: 过去-现在-未来</option>
                    <option value="five-card">五牌阵: 十字阵列</option>
                </select>
            </div>

            <button id="fortune-btn" class="glow-on-hover">静心冥想，开始占卜</button>
        </div>

        <div id="result-card" class="result-card result-hidden">
            <div class="spread-container"></div>
            <button class="glow-on-hover" onclick="restart()">重新占卜</button>
        </div>
    </div>

    <script>
        window.addEventListener('load', () => {
            const intro = document.querySelector('.intro-screen');
            setTimeout(() => {
                intro.style.display = 'none';
            }, 3000);
        });

        document.addEventListener('DOMContentLoaded', () => {
            const yearSelect = document.getElementById('year-select');
            const monthSelect = document.getElementById('month-select');
            const daySelect = document.getElementById('day-select');
            const nameInput = document.getElementById('name');
            const phoneInput = document.getElementById('phone');
            const fortuneBtn = document.getElementById('fortune-btn');
            const formCard = document.getElementById('form-card');
            const resultCard = document.getElementById('result-card');
            const starField = document.querySelector('.star-field');

            // 初始化日期下拉框
            const currentYear = new Date().getFullYear();
            for (let i = 1950; i <= currentYear; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + ' 年';
                yearSelect.appendChild(option);
            }
            yearSelect.value = 2000;

            for (let i = 1; i <= 12; i++) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + ' 月';
                monthSelect.appendChild(option);
            }
            monthSelect.value = 1;

            function updateDays() {
                const year = parseInt(yearSelect.value);
                const month = parseInt(monthSelect.value);
                const daysInMonth = new Date(year, month, 0).getDate();
                daySelect.innerHTML = '';
                for (let i = 1; i <= daysInMonth; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = i + ' 日';
                    daySelect.appendChild(option);
                }
            }
            yearSelect.addEventListener('change', updateDays);
            monthSelect.addEventListener('change', updateDays);
            updateDays();

            // 星空特效
            function createStars() {
                const numberOfStars = 150;
                for (let i = 0; i < numberOfStars; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1; 
                    star.style.width = `${size}px`;
                    star.style.height = `${size}px`;
                    star.style.top = `${Math.random() * 100}%`;
                    star.style.left = `${Math.random() * 100}%`;
                    star.style.animationDelay = `${Math.random() * 1.5}s`;
                    starField.appendChild(star);
                }
            }
            createStars();

            function createMeteor() {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                meteor.style.left = `${Math.random() * 100}%`;
                meteor.style.top = `${Math.random() * 20}%`; 
                starField.appendChild(meteor);
                meteor.addEventListener('animationend', () => {
                    meteor.remove();
                });
            }
            setInterval(createMeteor, 3000);

            // 核心功能：点击开始占卜
            fortuneBtn.addEventListener('click', () => {
                const name = nameInput.value.trim();
                const phone = phoneInput.value.trim();
                const birthday = `${yearSelect.value}-${monthSelect.value}-${daySelect.value}`;
                const spreadType = document.getElementById('spread-select').value;

                // 验证必填项
                if (!name || !phone) {
                    showMessageBox('请填写完整的称谓和手机号');
                    return;
                }
                if (phone.length < 11) {
                    showMessageBox('请输入正确的手机号码');
                    return;
                }

                // --- 发送资料到 Google 表格 ---
                // !!! 请在此处粘贴您部署后的真实 URL !!!
                const scriptUrl = 'https://script.google.com/macros/s/AKfycbzCXewC2A85ypBZxV2l0HVXlczdLY4VYrgrwxkOOPImKhcbliW2LL26n110IYC-hTA/exec';

                fetch(scriptUrl, {
                    method: 'POST',
                    mode: 'no-cors', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: name,
                        phone: phone,
                        birthday: birthday,
                        spread: spreadType === 'three-card' ? '三牌阵' : '五牌阵'
                    })
                });

                // --- 切换 UI 并生成占卜结果 ---
                formCard.classList.add('result-hidden');
                resultCard.classList.remove('result-hidden');

                const container = resultCard.querySelector('.spread-container');
                container.innerHTML = '';

                if (spreadType === 'three-card') {
                    container.className = 'spread-container three-card-spread';
                    generateSpread(3, ['过去', '现在', '未来']);
                } else {
                    container.className = 'spread-container five-card-spread';
                    generateSpread(5, ['指示牌', '挑战', '基础', '过去', '未来'], ['center', 'top', 'bottom', 'left', 'right']);
                }
            });

            // 占卜结果生成逻辑
            const fullTarotDeck = [

            function generateSpread(count, positions, areas = []) {
                const container = resultCard.querySelector('.spread-container');
                const usedIndices = new Set();
                
                for (let i = 0; i < count; i++) {
                    let randomIndex;
                    do {
                        randomIndex = Math.floor(Math.random() * fullTarotDeck.length);
                    } while (usedIndices.has(randomIndex));
                    usedIndices.add(randomIndex);

                    const card = fullTarotDeck[randomIndex];
                    const isReversed = Math.random() < 0.3;

                    const cardElement = document.createElement('div');
                    cardElement.className = `tarot-card ${isReversed ? 'reversed' : ''} ${areas[i] || ''}`;
                    cardElement.innerHTML = `
                        <span class="card-position-name">${positions[i]}</span>
                        <img src="https://via.placeholder.com/150x250/1e0f32/ffda6b?text=Tarot+Card" alt="${card.name}">
                        <p class="tarot-card-name-visible">${card.name} (${isReversed ? '逆位' : '正位'})</p>
                        <div class="card-hover-info">
                            <h3>${card.name} - ${card.title}</h3>
                            <h4>${isReversed ? '逆位含义' : '正位含义'}</h4>
                            <p>${isReversed ? card.reversedMeaning : card.uprightMeaning}</p>
                            <p class="keywords">关键词: ${card.keywords}</p>
                            <p class="suggestion">${card.suggestion}</p>
                        </div>
                    `;
                    container.appendChild(cardElement);
                }
            }

            window.restart = function() {
                formCard.classList.remove('result-hidden');
                resultCard.classList.add('result-hidden');
                nameInput.value = '';
                phoneInput.value = '';
            };

            function showMessageBox(message) {
                if (document.querySelector('.message-overlay')) return;
                const overlay = document.createElement('div');
                overlay.className = 'message-overlay';
                const messageBox = document.createElement('div');
                messageBox.className = 'message-box';
                messageBox.innerHTML = `
                    <div class="message-content">
                        <p>${message}</p>
                        <button class="message-ok">确定</button>
                    </div>
                `;
                document.body.appendChild(overlay);
                document.body.appendChild(messageBox);
                messageBox.querySelector('.message-ok').addEventListener('click', () => {
                    document.body.removeChild(overlay);
                    document.body.removeChild(messageBox);
